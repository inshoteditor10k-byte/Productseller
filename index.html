        atOptions = { 'key' : '71f469a0676044942280f6e5f52c9392', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
    </script>
    <script src="//www.topcreativeformat.com/71f469a0676044942280f6e5f52c9392/invoke.js"></script>

<!-- Bottom Navigation -->
<div class="bottom-nav" id="bottomNav">
    <button onclick="switchTab('home')" class="active" data-tab="home"><i class="fas fa-home"></i>Home</button>
    <button onclick="switchTab('trending')" data-tab="trending"><i class="fas fa-fire"></i>Trending</button>
    <button onclick="toggleCategories()"><i class="fas fa-th-large"></i>Categories</button>
    <button onclick="switchTab('wishlist')" data-tab="wishlist"><i class="fas fa-heart"></i>Wishlist</button>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script type="module">
    // Firebase Setup (Modular)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove, update, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDpF0VyF-4MeniRCO1L1oMhYtR5uBZkklU",
        authDomain: "apps-and-games-store-8c442.firebaseapp.com",
        databaseURL: "https://apps-and-games-store-8c442-default-rtdb.firebaseio.com",
        projectId: "apps-and-games-store-8c442",
        storageBucket: "apps-and-games-store-8c442.firebasestorage.app",
        messagingSenderId: "320735195272",
        appId: "1:320735195272:web:f6d8693160baf6eaf8af3d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // DB References
    const refs = {
        products: ref(db, 'products/'),
        expired: ref(db, 'expiredProducts/'),
        banners: ref(db, 'banners/'),
        categories: ref(db, 'categories/'),
        analytics: ref(db, 'analytics/totals')
    };

    // Global State
    let state = {
        products: {}, banners: {}, categories: {}, analytics: {},
        currentCategory: "ALL", currentView: "home",
        wishlist: JSON.parse(localStorage.getItem('wishlist')) || [],
        theme: localStorage.getItem('theme') || 'dark',
        isAdmin: false
    };

    const fallbackImage = "https://via.placeholder.com/300x200?text=Image+Not+Found";

    // Initialize Theme
    if (state.theme === 'light') document.body.classList.add('light-mode');

    // Utility: Toast
    window.showToast = (msg, type = 'success') => {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    };

    // Utility: Theme Toggle
    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        state.theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
        localStorage.setItem('theme', state.theme);
    };

    // Utility: Debounce for Search
    const debounce = (func, wait) => {
        let timeout; return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func(...args), wait); };
    };

    // Expiry/Date Helpers
    function getTimestamp(d, t) { return d ? new Date(`${d}T${t || '00:00:00'}`).getTime() : null; }
    function setInputsDate(ts, dInp, tInp) {
        if (!ts) { dInp.value = ''; tInp.value = ''; return; }
        const d = new Date(ts);
        dInp.value = d.toISOString().split('T')[0];
        tInp.value = d.toTimeString().substring(0,5);
    }
    
    function formatCountdown(ms) {
        if (ms <= 0) return 'Expired';
        const d = Math.floor(ms / 86400000), h = Math.floor((ms % 86400000) / 3600000), m = Math.floor((ms % 3600000) / 60000);
        return `Ends in: ${d}d ${h}h ${m}m`;
    }

    // DB Listeners
    onValue(refs.categories, s => { state.categories = s.val() || {}; renderCategories(); renderAdminCategories(); });
    onValue(refs.banners, s => { state.banners = s.val() || {}; renderBanners(); renderAdminBanners(); });
    onValue(refs.analytics, s => { state.analytics = s.val() || { views:0, clicks:0, sales:0 }; updateAdminAnalytics(); });
    onValue(refs.products, s => {
        state.products = s.val() || {};
        document.getElementById("products").innerHTML = ""; // Remove skeleton
        renderAllViews();
        renderAdminProducts();
        updateAdminAnalytics();
    });

    function getActiveProducts() {
        const now = Date.now();
        return Object.entries(state.products)
            .filter(([id, p]) => (!p.hidden || state.isAdmin) && (!p.expiryDateTime || p.expiryDateTime > now))
            .map(([id, p]) => ({ id, ...p }));
    }

    // Main Renderer
    function renderAllViews() {
        const query = document.getElementById("search").value.trim().toLowerCase();
        const activeList = getActiveProducts();
        
        document.getElementById("homeSections").style.display = (query || state.currentView !== 'home') ? 'none' : 'block';
        document.getElementById("banner").style.display = (query || state.currentView !== 'home') ? 'none' : 'block';

        if (state.currentView === 'home' && !query && state.currentCategory === 'ALL') {
            renderCarousel("featuredProducts", activeList.filter(p => p.featured), "featuredWrapper");
            renderCarousel("trendingCarousel", [...activeList].sort((a,b)=>(b.views || 0) - (a.views || 0)).slice(0, 10), "trendingWrapper");
            document.getElementById("mainGridTitle").innerText = "Just Arrived";
        }

        renderMainGrid(activeList, query);
    }

    function renderMainGrid(list, query) {
        const container = document.getElementById("products");
        container.innerHTML = "";

        if (query) {
            list = list.filter(p => (p.title||'').toLowerCase().includes(query) || (p.tags||'').toLowerCase().includes(query));
        } else if (state.currentView === 'wishlist') {
            list = list.filter(p => state.wishlist.includes(p.id));
        } else if (state.currentCategory !== "ALL") {
            list = list.filter(p => p.category === state.currentCategory);
        }

        const sortBy = document.getElementById("sortProducts").value;
        list.sort((a, b) => {
            if (sortBy === 'popular') return (b.views || 0) - (a.views || 0);
            if (sortBy === 'discount') return (b.discount || 0) - (a.discount || 0);
            if (sortBy === 'price-low-high') return (a.finalPrice || 0) - (b.finalPrice || 0);
            if (sortBy === 'price-high-low') return (b.finalPrice || 0) - (a.finalPrice || 0);
            return (b.createdAt || 0) - (a.createdAt || 0);
        });

        if (list.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px 0; opacity:0.7;">No products found.</div>`;
            return;
        }

        list.forEach(p => container.appendChild(createProductCard(p)));
        startTimers();
    }

    function renderCarousel(containerId, list, wrapperId) {
        const wrapper = document.getElementById(wrapperId);
        const container = document.getElementById(containerId);
        if (list.length === 0) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = 'block';
        container.innerHTML = "";
        list.forEach(p => container.appendChild(createProductCard(p)));
    }

    function createProductCard(product) {
        const card = document.createElement("div");
        card.className = "card";
        
        let badges = [];
        if (product.discount > 0) badges.push(`<div class="badge discount-badge">${product.discount}% OFF</div>`);
        if (product.featured) badges.push(`<div class="badge featured-badge"><i class="fas fa-bolt"></i> Featured</div>`);
        if (product.stock !== undefined && product.stock <= 0) badges.push(`<div class="badge stock-badge">Out of Stock</div>`);
        else if (product.stock > 0 && product.stock < 5) badges.push(`<div class="badge stock-badge" style="background:#ff9800;">Only ${product.stock} left</div>`);

        let stars = Array(5).fill('<i class="far fa-star"></i>');
        if (product.rating) {
            const r = Math.round(product.rating);
            for(let i=0; i<r; i++) stars[i] = '<i class="fas fa-star"></i>';
        }

        const isWished = state.wishlist.includes(product.id);

        card.innerHTML = `
            <div class="image-container">
                <img src="${product.images?.[0] || fallbackImage}" loading="lazy" onerror="this.src='${fallbackImage}'">
                ${badges.join('')}
            </div>
            <div class="card-content">
                <h3>${product.title || 'Untitled'}</h3>
                <p class="category-text">${product.category || 'General'}</p>
                <div class="card-stats">
                    <span class="stars">${stars.join('')} ${product.rating || ''}</span>
                    <span><i class="fas fa-eye"></i> ${product.views || 0}</span>
                </div>
                <div class="price-container">
                    <span class="final-price">₹ ${product.finalPrice?.toFixed(2)}</span>
                    ${product.discount > 0 ? `<span class="original-price">₹ ${product.price?.toFixed(2)}</span>` : ''}
                </div>
                ${product.expiryDateTime ? `<div class="countdown-timer" data-expiry="${product.expiryDateTime}"></div>` : ''}
                
                <div class="btn-group">
                    <button class="wishlist-btn ${isWished ? 'active' : ''}" onclick="toggleWishlist('${product.id}', event)"><i class="fas fa-heart"></i></button>
                    <button class="view-button" onclick="openProduct('${product.id}')">Details</button>
                </div>
            </div>
        `;
        return card;
    }

    window.toggleWishlist = (id, event) => {
        event.stopPropagation();
        const idx = state.wishlist.indexOf(id);
        if (idx > -1) { state.wishlist.splice(idx, 1); showToast("Removed from wishlist", "error"); } 
        else { state.wishlist.push(id); showToast("Added to wishlist", "success"); }
        localStorage.setItem('wishlist', JSON.stringify(state.wishlist));
        renderAllViews();
    };

    // Categories UI
    function renderCategories() {
        const panel = document.getElementById("categoriesPanel");
        panel.innerHTML = `<div class="category-chip ${state.currentCategory==='ALL'?'active':''}" onclick="setCategory('ALL')">ALL</div>`;
        Object.values(state.categories).sort().forEach(cat => {
            panel.innerHTML += `<div class="category-chip ${state.currentCategory===cat?'active':''}" onclick="setCategory('${cat}')">${cat}</div>`;
        });
    }
    window.setCategory = (c) => { state.currentCategory = c; state.currentView = 'home'; updateNavHighlight(); renderAllViews(); renderCategories(); };
    window.toggleCategories = () => {
        const p = document.getElementById("categoriesPanel");
        p.style.display = p.style.display === "flex" ? "none" : "flex";
    };

    // Search UI
    const searchInp = document.getElementById("search");
    const suggBox = document.getElementById("suggestions");
    searchInp.addEventListener("input", debounce(() => {
        const q = searchInp.value.trim().toLowerCase();
        if(q.length > 0) {
            const matches = getActiveProducts().filter(p => (p.title||'').toLowerCase().includes(q)).slice(0, 8);
            if(matches.length > 0) {
                suggBox.innerHTML = matches.map(p => `<div class="suggestion-item" onclick="selectSearch('${p.title.replace(/'/g,"\\'")}')"><i class="fas fa-search"></i> ${p.title}</div>`).join('');
                suggBox.style.display = 'block';
            } else suggBox.style.display = 'none';
        } else suggBox.style.display = 'none';
        renderAllViews();
    }, 300));
    window.selectSearch = (val) => { searchInp.value = val; suggBox.style.display = 'none'; renderAllViews(); };
    document.getElementById("searchBtn").onclick = renderAllViews;
    document.getElementById("sortProducts").onchange = renderAllViews;

    // Tabs
    window.switchTab = (tab) => {
        state.currentView = tab; state.currentCategory = 'ALL'; searchInp.value = '';
        document.getElementById('categoriesPanel').style.display = 'none';
        updateNavHighlight(tab); renderAllViews(); renderCategories();
    };
    function updateNavHighlight(tab = state.currentView) {
        document.querySelectorAll('.bottom-nav button').forEach(b => {
            b.classList.toggle('active', b.dataset.tab === tab);
        });
    }

    // Modal Details
    window.openProduct = (id) => {
        const p = state.products[id]; if(!p) return;
        
        // Track View
        update(ref(db, `products/${id}`), { views: increment(1) });
        update(ref(db, 'analytics/totals'), { views: increment(1) });

        document.body.style.overflow = 'hidden';
        const gallery = (p.images||[]).map(url => `<img src="${url}" class="modal-gallery-image" onerror="this.src='${fallbackImage}'">`).join('');
        const tags = (p.tags||'').split(',').filter(t=>t.trim()).map(t=>`<span class="tag">#${t.trim()}</span>`).join('');
        
        let cpnHtml = '';
        if(p.coupon) {
            cpnHtml = `<div class="coupon-box">
                <span style="font-size:12px; opacity:0.8;">Use Code:</span>
                <code id="cpnText">${p.coupon}</code>
                <button class="icon-btn" onclick="copyCoupon('${p.coupon}')"><i class="fas fa-copy"></i></button>
            </div>`;
        }

        const shareUrl = encodeURIComponent(window.location.href);
        const shareText = encodeURIComponent(`Check out ${p.title} on Futuristic Store!`);

        document.getElementById("modalContent").innerHTML = `
            <button class="close-btn" onclick="closeModals()">×</button>
            <div class="modal-image-gallery">${gallery||`<img src="${fallbackImage}" class="modal-gallery-image">`}</div>
            <h2>${p.title}</h2>
            <div class="tags-container">${tags}</div>
            <div class="price-container" style="margin: 15px 0;">
                <span class="final-price" style="font-size:24px;">₹ ${p.finalPrice?.toFixed(2)}</span>
                ${p.discount>0 ? `<span class="original-price">₹ ${p.price?.toFixed(2)}</span> <span class="badge discount-badge" style="position:relative; top:0; left:0;">${p.discount}% OFF</span>` : ''}
            </div>
            <p style="opacity:0.9; font-size:14px; line-height:1.6;">${p.description}</p>
            ${cpnHtml}
            
            <div class="modal-actions">
                <button onclick="buyProduct('${id}', '${p.affiliateLink}')" style="width:100%; padding:15px; border-radius:10px; background:linear-gradient(90deg, #00f5ff, #9b5cff); border:none; color:#fff; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(0,245,255,0.4);"><i class="fas fa-shopping-cart"></i> Get Deal Now</button>
            </div>

            <div class="share-links">
                <button class="share-btn wa" onclick="window.open('https://wa.me/?text=${shareText} ${shareUrl}')"><i class="fab fa-whatsapp"></i></button>
                <button class="share-btn tg" onclick="window.open('https://t.me/share/url?url=${shareUrl}&text=${shareText}')"><i class="fab fa-telegram-plane"></i></button>
                <button class="share-btn cp" onclick="copyToClipboard('${window.location.href}')"><i class="fas fa-link"></i></button>
            </div>
        `;
        document.getElementById("productModal").classList.add('show');
    };

    window.closeModals = () => {
        document.body.style.overflow = 'auto';
        document.getElementById("productModal").classList.remove('show');
        document.getElementById("adminLoginModal").classList.remove('show');
    };

    window.copyCoupon = (code) => { navigator.clipboard.writeText(code); showToast("Coupon Copied!"); };
    window.copyToClipboard = (txt) => { navigator.clipboard.writeText(txt); showToast("Link Copied!"); };

    window.buyProduct = (id, link) => {
        update(ref(db, `products/${id}`), { clicks: increment(1), sales: increment(1) });
        update(ref(db, 'analytics/totals'), { clicks: increment(1), sales: increment(1) });
        if(link) window.open(link, '_blank');
    };

    // Auto Expiry & Countdown Engine
    setInterval(() => {
        const now = Date.now();
        document.querySelectorAll('[data-expiry]').forEach(el => {
            const rem = parseInt(el.dataset.expiry) - now;
            el.innerText = rem > 0 ? formatCountdown(rem) : 'Expired';
        });
    }, 60000);

    setInterval(() => { // Check DB expiries
        const now = Date.now();
        Object.entries(state.products).forEach(([id, p]) => {
            if(p.expiryDateTime && p.expiryDateTime < now) {
                set(ref(db, `expiredProducts/${id}`), p);
                remove(ref(db, `products/${id}`));
            }
        });
        Object.entries(state.banners).forEach(([id, b]) => {
            if(b.expiryDateTime && b.expiryDateTime < now) remove(ref(db, `banners/${id}`));
        });
    }, 60000);

    // Render Banners
    let bannerInterval;
    function renderBanners() {
        const b = document.getElementById("banner");
        b.innerHTML = ""; clearInterval(bannerInterval);
        const list = Object.values(state.banners).filter(x => !x.expiryDateTime || x.expiryDateTime > Date.now());
        if(!list.length) return;
        
        list.forEach((item, i) => {
            const img = document.createElement("img");
            img.src = item.image || fallbackImage; img.loading = "lazy";
            img.onclick = () => window.location.href = item.link;
            if(i===0) img.classList.add('active');
            b.appendChild(img);
        });

        const slides = b.querySelectorAll("img");
        if(slides.length > 1) {
            let idx = 0;
            bannerInterval = setInterval(() => {
                slides.forEach(s=>s.classList.remove('active'));
                idx = (idx+1)%slides.length;
                slides[idx].classList.add('active');
            }, 3000);
        }
    }

    // --- ADMIN SYSTEM ---
    onAuthStateChanged(auth, user => {
        state.isAdmin = !!user;
        if(state.isAdmin && document.getElementById('adminLoginModal').classList.contains('show')) {
            closeModals();
            document.getElementById('adminPanel').style.display = 'block';
            showToast("Admin access granted");
        }
    });

    window.openAdminAuth = () => {
        if(state.isAdmin) document.getElementById('adminPanel').style.display = 'block';
        else document.getElementById('adminLoginModal').classList.add('show');
    };

    window.loginAdmin = async () => {
        const e = document.getElementById('adminEmail').value, p = document.getElementById('adminPass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch (err) { 
            // Graceful Fallback for demo/setup purposes if Firebase Auth is not configured yet
            if(p === "ss620631") { // Keeping legacy backdoor per user request to not break existing access if FB auth fails
                state.isAdmin = true; closeModals();
                document.getElementById('adminPanel').style.display = 'block';
                showToast("Legacy Admin Logged In", "success");
            } else {
                showToast(err.message.replace('Firebase:', '').trim(), "error"); 
            }
        }
    };
    window.logoutAdmin = () => { signOut(auth); state.isAdmin = false; closeAdmin(); showToast("Logged out"); };
    window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';

    function updateAdminAnalytics() {
        document.getElementById('statTotalItems').innerText = Object.keys(state.products).length;
        document.getElementById('statViews').innerText = state.analytics.views || 0;
        document.getElementById('statClicks').innerText = state.analytics.clicks || 0;
        document.getElementById('statSales').innerText = state.analytics.sales || 0;
    }

    // Admin Products Data handling
    document.getElementById("pOriginalPrice").oninput = calcPrice;
    document.getElementById("pDiscount").oninput = calcPrice;
    function calcPrice() {
        const p = parseFloat(document.getElementById("pOriginalPrice").value)||0;
        const d = parseFloat(document.getElementById("pDiscount").value)||0;
        document.getElementById("finalPricePreview").innerText = `₹ ${(p - p*d/100).toFixed(2)}`;
    }

    window.addImageField = (url='') => {
        const c = document.getElementById("imageFields");
        const div = document.createElement('div'); div.style = "display:flex; gap:5px; margin-bottom:5px;";
        div.innerHTML = `<input type="url" class="pImage" placeholder="Image URL" value="${url}" style="margin:0;"><button class="btn-danger" style="width:40px; margin:0;" onclick="this.parentElement.remove()">X</button>`;
        c.appendChild(div);
    };

    window.saveProduct = () => {
        const id = document.getElementById("pId").value;
        const title = document.getElementById("pTitle").value.trim();
        const desc = document.getElementById("pDesc").value.trim();
        const price = parseFloat(document.getElementById("pOriginalPrice").value)||0;
        const discount = parseFloat(document.getElementById("pDiscount").value)||0;
        const stock = parseInt(document.getElementById("pStock").value);
        const rating = parseFloat(document.getElementById("pRating").value);
        const cat = document.getElementById("pCategory").value;
        const tags = document.getElementById("pTags").value.trim();
        const link = document.getElementById("pAffiliateLink").value.trim();
        const coupon = document.getElementById("pCoupon").value.trim();
        const feat = document.getElementById("pFeatured").checked;
        const hid = document.getElementById("pHidden").checked;
        const exp = getTimestamp(document.getElementById("pExpiryDate").value, document.getElementById("pExpiryTime").value);
        const images = [...document.querySelectorAll(".pImage")].map(i=>i.value.trim()).filter(Boolean);

        if(!title || !price || !cat) return showToast("Title, Price and Category are required!", "error");

        const data = {
            title, description: desc, price, discount, finalPrice: price - (price*discount/100),
            category: cat, tags, affiliateLink: link, coupon, featured: feat, hidden: hid,
            images, expiryDateTime: exp,
            stock: isNaN(stock) ? null : stock, rating: isNaN(rating) ? null : rating,
            updatedAt: Date.now()
        };

        if(!id) { data.createdAt = Date.now(); data.views = 0; data.clicks = 0; data.sales = 0; }
        
        const req = id ? update(ref(db, `products/${id}`), data) : set(push(refs.products), data);
        req.then(()=>{ showToast("Product Saved!"); clearProductForm(); }).catch(e=>showToast(e.message, "error"));
    };

    window.clearProductForm = () => {
        ['pId','pTitle','pDesc','pOriginalPrice','pDiscount','pStock','pRating','pTags','pAffiliateLink','pCoupon','pExpiryDate','pExpiryTime'].forEach(i=>document.getElementById(i).value='');
        ['pFeatured','pHidden'].forEach(i=>document.getElementById(i).checked=false);
        document.getElementById('imageFields').innerHTML=''; addImageField(); calcPrice();
    };

    window.editProduct = (id) => {
        const p = state.products[id]; if(!p) return;
        document.getElementById("pId").value = id;
        document.getElementById("pTitle").value = p.title||'';
        document.getElementById("pDesc").value = p.description||'';
        document.getElementById("pOriginalPrice").value = p.price||'';
        document.getElementById("pDiscount").value = p.discount||'';
        document.getElementById("pStock").value = p.stock||'';
        document.getElementById("pRating").value = p.rating||'';
        document.getElementById("pCategory").value = p.category||'';
        document.getElementById("pTags").value = p.tags||'';
        document.getElementById("pAffiliateLink").value = p.affiliateLink||'';
        document.getElementById("pCoupon").value = p.coupon||'';
        document.getElementById("pFeatured").checked = p.featured||false;
        document.getElementById("pHidden").checked = p.hidden||false;
        setInputsDate(p.expiryDateTime, document.getElementById("pExpiryDate"), document.getElementById("pExpiryTime"));
        
        document.getElementById("imageFields").innerHTML='';
        if(p.images) p.images.forEach(u=>addImageField(u)); else addImageField();
        calcPrice(); document.getElementById("adminPanel").scrollTo(0,0);
    };

    window.deleteProduct = (id) => { if(confirm("Delete Product?")) remove(ref(db, `products/${id}`)); };

    function renderAdminProducts() {
        const c = document.getElementById("adminProductList"); c.innerHTML = "";
        const list = Object.entries(state.products).sort((a,b)=>b[1].createdAt - a[1].createdAt).slice(0,50);
        list.forEach(([id, p]) => {
            c.innerHTML += `
            <div class="admin-list-item">
                <img src="${p.images?.[0]||fallbackImage}">
                <div class="admin-item-info"><h4>${p.title}</h4><p>Views: ${p.views||0} | Sales: ${p.sales||0}</p></div>
                <div class="admin-item-actions"><button onclick="editProduct('${id}')"><i class="fas fa-pen"></i></button><button class="btn-danger" onclick="deleteProduct('${id}')"><i class="fas fa-trash"></i></button></div>
            </div>`;
        });
    }

    // Admin Categories
    window.addCategory = () => {
        const v = document.getElementById("newCategoryName").value.trim();
        if(v) { push(refs.categories, v); document.getElementById("newCategoryName").value=''; }
    };
    window.deleteCategory = (id) => { if(confirm("Delete Category?")) remove(ref(db, `categories/${id}`)); };
    function renderAdminCategories() {
        const sel = document.getElementById("pCategory"), list = document.getElementById("categoryList");
        sel.innerHTML = '<option value="">Select Category</option>'; list.innerHTML = '';
        Object.entries(state.categories).forEach(([id, c]) => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
            list.innerHTML += `<div class="admin-list-item" style="padding:5px 10px;"><span>${c}</span> <button class="btn-danger" onclick="deleteCategory('${id}')" style="width:auto; padding:5px;"><i class="fas fa-trash"></i></button></div>`;
        });
    }

    // Admin Banners
    window.addBannerField = (id='', img='', link='', exp=null) => {
        const d = document.createElement('div'); d.className = 'admin-list-item'; d.style.flexDirection = 'column'; d.style.alignItems='stretch';
        d.innerHTML = `
            <input type="hidden" class="bId" value="${id}">
            <input type="url" class="bImg" placeholder="Image URL" value="${img}" style="margin-bottom:5px;">
            <input type="url" class="bLink" placeholder="Redirect Link" value="${link}" style="margin-bottom:5px;">
            <div style="display:flex; gap:10px;"><input type="date" class="bDate"><input type="time" class="bTime"><button class="btn-danger" onclick="this.parentElement.parentElement.remove()" style="margin:0;"><i class="fas fa-trash"></i></button></div>`;
        setInputsDate(exp, d.querySelector('.bDate'), d.querySelector('.bTime'));
        document.getElementById("bannerFields").appendChild(d);
    };
    window.saveBanners = () => {
        [...document.querySelectorAll("#bannerFields .admin-list-item")].forEach(el => {
            const id = el.querySelector('.bId').value, img = el.querySelector('.bImg').value, link = el.querySelector('.bLink').value;
            const exp = getTimestamp(el.querySelector('.bDate').value, el.querySelector('.bTime').value);
            if(img && link) {
                const b = { image:img, link, expiryDateTime:exp };
                id ? update(ref(db, `banners/${id}`), b) : set(push(refs.banners), b);
            }
        });
        document.getElementById("bannerFields").innerHTML=''; showToast("Banners Saved!");
    };
    window.deleteBanner = id => remove(ref(db, `banners/${id}`));
    function renderAdminBanners() {
        const c = document.getElementById("adminBannerList"); c.innerHTML='';
        Object.entries(state.banners).forEach(([id, b]) => {
            c.innerHTML += `<div class="admin-list-item"><img src="${b.image}"><div class="admin-item-info"><h4>Banner</h4><p>${b.link}</p></div><button class="btn-danger" onclick="deleteBanner('${id}')"><i class="fas fa-trash"></i></button></div>`;
        });
    }

    // Notifications API (OneSignal)
    window.sendManualNotification = async () => {
        const title = document.getElementById("notificationTitle").value;
        const msg = document.getElementById("notificationMessage").value;
        const url = document.getElementById("notificationUrl").value;
        if(!title || !msg) return showToast("Title and message required", "error");
        
        try {
            const res = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Basic os_v2_app_sqdeowuz7nfiri6ulyvegtmmka4lu7zmkvcu7l4uhebtui24kyvn7jzn2jw3ebkkzbt6ckvehovya3cyh4t5slvkwiekkekxhynftky" },
                body: JSON.stringify({ app_id: "9406475a-99fb-4a88-a3d4-5e2a434d8c50", included_segments: ["All"], headings: {"en": title}, contents: {"en": msg}, url: url || undefined })
            });
            if(!res.ok) throw new Error("Failed to send");
            showToast("Notification Sent Successfully!");
            document.getElementById("notificationTitle").value = ''; document.getElementById("notificationMessage").value = '';
        } catch(e) { showToast(e.message, "error"); }
    };

    // Initial load handlers
    if(!document.getElementById("imageFields").children.length) addImageField();
</script>
</body>
  </html>
